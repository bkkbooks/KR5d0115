body:
  text: 悟玄子賢芝膺圖述余耽至術久辛勤撈漉仙經二十春偶向火中求白汞瞥然水裏覩鉛銀始知不枉平生志醒悟從來夢幻身長爇沈檀香一炷洗心朝禮玉皇真愧慙一卒起轅門豈料烏光照覆盆指得五行來往剋識他龍虎競相吞轉南為北成從北棄有存無無却存除却志同方始話非其人處不言論實知得遇是天然塵中凡眼見丹田神理暗中垂慜默仙經卷裏悟精專黃芽鍊向爐中覩聖石修來掌上看志脫塵埃身未脫目前萬事盡成間因覽參同覺眼明黃芽只在世間生人人顛倒無尋處箇箇昏迷空遠行四物周回為始蒂兩般和會契初萌河車漸變牙胎質轉却青龍白虎形悟得真鉛返却驚塵中身恐悮神明未修功行根機淺處在凡蒙慮骨輕自此有心憐水土從今無意戀金瓊乾坤鼎就年周滿携取丹瓢往赤城傳聞出世有仙丹學者如麻得者難只鍊四黃攻八石不知龍虎作何顔區區但展經書讀矻矻長開萬卷看動便辛勤三十載鬢霜終不識真鉛百億人求不可求古今此事甚深幽南方事體當朱夏北治容光轉白秋苦志鍊來無計鍊專心修處擬何修欲尋尋得天涯遍未遇生前雪滿頭仙丹神術事深奇古往今來得者希淺智度量何所見上人思忖尚懷疑從無入有神難測自有從無聖不知莫怪仙經長隱祕留傳只恐泄天機還丹浩渺實難窮無分千生不可逢得了隱藏須守護莫將金玉貴相同成來燕雀餐為鳳悟了蛇魚食化龍如此神功難可述豈因循話向愚蒙須知不易得周圓實是千難與萬難舉世只知微小術誰人肯學大還丹金銀共説皆聞喜鉛汞才聞似夢間如此錯來經百萬未登五十鬢先斑還丹至藥篇
