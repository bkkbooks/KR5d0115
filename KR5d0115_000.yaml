front:
  text: 還丹至藥篇序余少處轅門操心僻好因逢同志相示紅爐荏苒修持經二十載塵心不改世意長存但貪利術之門不究金丹之要泊乎漂泊一事無成悮錯躘踵遣途失墜後乃信知八石元無入聖之功便如五金只是凡常之物余雖無成不懷怨恨自知學不究於玄機理乖深遠後因脫大難偶遇至人慜余苦心傳余口訣蒙設盟分付事不虛傳誓囑丁寧不許傳於塵庶余便依訣修鍊親覩神功實為玄微獨稱要妙賢芝雖則頓悟返却驚駭一恐功行未周二慮骨輕命薄且見從來學者盡是金枝玉葉帝子王孫抱器英儒懷才君子留心者動經百萬成名者不覩二三信知不在貴豪得者直須計分賢芝愧為一卒遭遇仙方覩真鉛真汞之根基辨真水真火之始末黃芽樞要撮在掌中秋石玄微簇於襟抱如斯過望計自萬生賢芝遂便改過修真不貪奢侈麻衣弊服惟愜本情布德存神治救不足昨因間暇想己同流謾費心神虛勞肺腑學攻丹竈指蛇為龍如此參差虛來無數未知鉛汞之本蒂空為點化之誑詞洎乎八石奔騰五金焦耗賢芝今則聊陳短見激勸志學同流大藥不無還丹實有須得內外相似心口不殊莫憚苦辛親覲上哲書此十頌將示同人共隱雲霄永棄塵埃者矣還丹至藥篇
